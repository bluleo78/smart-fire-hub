spring:
  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB:smartfirehub}
    username: ${POSTGRES_USER:app}
    password: ${POSTGRES_PASSWORD}

org:
  jobrunr:
    dashboard:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  pipeline:
    datasource:
      url: jdbc:postgresql://db:5432/${POSTGRES_DB:smartfirehub}
      username: pipeline_executor
      password: ${PIPELINE_EXECUTOR_PASSWORD}
  executor:
    enabled: true
    base-url: ${EXECUTOR_BASE_URL:http://executor:8000}
    internal-token: ${EXECUTOR_INTERNAL_TOKEN:executor-token}

agent:
  url: http://ai-agent:3001
  internal-token: ${AGENT_INTERNAL_TOKEN}

app.cookie:
  secure: ${COOKIE_SECURE:false}
