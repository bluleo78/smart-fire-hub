spring:
  application:
    name: smart-fire-hub
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 46
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

org:
  jobrunr:
    background-job-server:
      enabled: true
      delete-succeeded-jobs-after: 720h
      permanently-delete-deleted-jobs-after: 2160h
    dashboard:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 1800000
    refresh-expiration: 604800000
  encryption:
    master-key: ${ENCRYPTION_MASTER_KEY}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  pipeline:
    datasource:
      url: ${spring.datasource.url}
      username: pipeline_executor
      password: ${PIPELINE_EXECUTOR_PASSWORD:pipeline_exec_pwd}
  executor:
    enabled: true
    base-url: ${EXECUTOR_BASE_URL:http://localhost:8000}
    internal-token: ${EXECUTOR_INTERNAL_TOKEN:dev-executor-token}

firehub:
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-files-per-request: 3
    expiry-hours: 24
