<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Smart Fire Hub Report</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 20px;
        color: #333;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .header {
        background: #1a1a2e;
        color: #ffffff;
        padding: 28px 32px;
      }
      .header h1 {
        margin: 0 0 6px 0;
        font-size: 22px;
        font-weight: 700;
      }
      .header .meta {
        font-size: 13px;
        color: #adb5bd;
        margin: 0;
      }
      .content {
        padding: 24px 32px;
      }
      .section {
        margin-bottom: 28px;
      }
      .section:last-child {
        margin-bottom: 0;
      }
      .section-label {
        font-size: 14px;
        font-weight: 700;
        color: #1a1a2e;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 2px solid #e9ecef;
        padding-bottom: 8px;
        margin-bottom: 12px;
      }
      .section-content {
        font-size: 14px;
        line-height: 1.7;
        color: #495057;
        word-break: break-word;
      }
      .section-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
      .section-content th,
      .section-content td { border: 1px solid #dee2e6; padding: 6px 10px; text-align: left; font-size: 13px; }
      .section-content th { background-color: #f1f3f5; font-weight: 600; }
      .cards-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .card {
        flex: 1;
        min-width: 100px;
        padding: 14px 16px;
        border-radius: 6px;
        text-align: center;
        background: #f8f9fa;
        border: 1px solid #e9ecef;
      }
      .card.blue { background: #e7f5ff; border-color: #74c0fc; }
      .card.green { background: #ebfbee; border-color: #69db7c; }
      .card.red { background: #fff5f5; border-color: #ff8787; }
      .card.yellow { background: #fff9db; border-color: #ffd43b; }
      .card.gray { background: #f8f9fa; border-color: #ced4da; }
      .card-value {
        font-size: 26px;
        font-weight: 700;
        color: #1a1a2e;
        line-height: 1.1;
      }
      .card-label {
        font-size: 12px;
        color: #868e96;
        margin-top: 4px;
      }
      .footer {
        background: #f8f9fa;
        padding: 16px 32px;
        font-size: 12px;
        color: #868e96;
        border-top: 1px solid #e9ecef;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .footer .brand {
        font-weight: 600;
        color: #495057;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 th:text="${title}">리포트 제목</h1>
        <p class="meta">
          <span th:text="${jobName}">Job Name</span>
          &nbsp;·&nbsp;
          <span th:text="${generatedAt}">2026-01-01 09:00</span>
        </p>
      </div>

      <div class="content">
        <div th:each="section : ${sections}" class="section">
          <div class="section-label" th:text="${section['label']}">섹션</div>

          <!-- cards 타입 섹션 -->
          <th:block th:if="${section['cards'] != null and !section['cards'].isEmpty()}">
            <div class="cards-row">
              <div
                th:each="card : ${section['cards']}"
                class="card"
                th:classappend="${card['color'] != null ? card['color'] : 'gray'}"
              >
                <div class="card-value" th:text="${card['value']}">0</div>
                <div class="card-label" th:text="${card['label']}">항목</div>
              </div>
            </div>
          </th:block>

          <!-- 차트 이미지 (있는 경우) -->
          <th:block th:if="${section['chartCid'] != null}">
            <div style="margin: 12px 0; text-align: center;">
              <img th:src="'cid:' + ${section['chartCid']}"
                   style="max-width: 100%; height: auto; border-radius: 8px;"
                   alt="차트" />
            </div>
          </th:block>

          <!-- 일반 텍스트 콘텐츠 (HTML로 변환된 마크다운) -->
          <div
            th:if="${section['content'] != null and !section['content'].isBlank()}"
            class="section-content"
            th:utext="${section['content']}"
          >
            내용
          </div>
        </div>
      </div>

      <div class="footer">
        <span class="brand">Smart Fire Hub</span>
        <span>자동 발송 메일</span>
      </div>
    </div>
  </body>
</html>
