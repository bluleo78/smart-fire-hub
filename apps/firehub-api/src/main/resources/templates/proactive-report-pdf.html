<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${title}">Smart Fire Hub Report</title>
    <style>
      @page { size: A4; margin: 15mm 20mm; }
      body { font-family: 'NanumGothic', sans-serif; font-size: 11pt; color: #333333; line-height: 1.6; margin: 0; padding: 0; }
      .header { background-color: #1a1a2e; color: #ffffff; padding: 20px 24px; border-radius: 6px; margin-bottom: 20px; }
      .header h1 { margin: 0 0 4px 0; font-size: 18pt; font-weight: 700; color: #ffffff; }
      .header .meta { font-size: 9pt; color: #adb5bd; margin: 0; }
      .section { margin-bottom: 20px; page-break-inside: avoid; }
      .section-label { font-size: 11pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #e9ecef; padding-bottom: 6px; margin-bottom: 10px; }
      .section-content { font-size: 10pt; line-height: 1.7; color: #495057; word-break: break-word; }
      .section-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
      .section-content th, .section-content td { border: 1px solid #dee2e6; padding: 5px 8px; text-align: left; font-size: 9pt; }
      .section-content th { background-color: #f1f3f5; font-weight: 600; }
      .cards-row { margin-bottom: 10px; }
      .cards-row table { width: 100%; border-collapse: separate; border-spacing: 8px 0; }
      .card { text-align: center; padding: 10px 12px; border-radius: 4px; background-color: #f8f9fa; border: 1px solid #e9ecef; }
      .card-value { font-size: 18pt; font-weight: 700; color: #1a1a2e; }
      .card-label { font-size: 8pt; color: #868e96; margin-top: 2px; }
      .chart-image { margin: 10px 0; text-align: center; }
      .chart-image img { max-width: 100%; height: auto; border-radius: 6px; }
      .footer { margin-top: 30px; padding-top: 10px; border-top: 1px solid #e9ecef; font-size: 8pt; color: #868e96; text-align: center; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 th:text="${title}">리포트 제목</h1>
      <p class="meta">
        <span th:text="${jobName}">Job Name</span>
        &#160;·&#160;
        <span th:text="${generatedAt}">2026-01-01 09:00</span>
      </p>
    </div>

    <div th:each="section : ${sections}" class="section"
         th:style="'margin-left: ' + (${section['depth'] != null ? (section['depth'] - 1) * 20 : 0}) + 'px'">

      <!-- divider 타입 -->
      <th:block th:if="${section['type'] == 'divider'}">
        <hr style="border: none; border-top: 1px solid #e9ecef; margin: 12px 0;" />
      </th:block>

      <!-- group 타입 -->
      <th:block th:if="${section['type'] == 'group'}">
        <div class="section-label" style="font-size: 13pt; font-weight: 800;" th:text="${section['label']}">그룹</div>
      </th:block>

      <!-- 일반 섹션 (divider, group 아닌 경우) -->
      <th:block th:if="${section['type'] != 'divider' and section['type'] != 'group'}">
        <div class="section-label" th:text="${section['label']}">섹션</div>

        <!-- cards 타입 섹션 (table 레이아웃, Flying Saucer는 flexbox 미지원) -->
        <th:block th:if="${section['cards'] != null and !section['cards'].isEmpty()}">
          <div class="cards-row">
            <table>
              <tr>
                <th:block th:each="card : ${section['cards']}">
                  <td class="card">
                    <div class="card-value" th:text="${card['value']}">0</div>
                    <div class="card-label" th:text="${card['label']}">항목</div>
                  </td>
                </th:block>
              </tr>
            </table>
          </div>
        </th:block>

        <!-- 차트 이미지 (data URI 방식) -->
        <th:block th:if="${section['chartDataUri'] != null}">
          <div class="chart-image">
            <img th:src="${section['chartDataUri']}" alt="차트" />
          </div>
        </th:block>

        <!-- 일반 텍스트 콘텐츠 (HTML로 변환된 마크다운) -->
        <div
          th:if="${section['content'] != null and !section['content'].isBlank()}"
          class="section-content"
          th:utext="${section['content']}"
        >내용</div>
      </th:block>
    </div>

    <div class="footer">
      Smart Fire Hub에서 자동 생성됨
    </div>
  </body>
</html>
